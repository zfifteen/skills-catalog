interface:
  display_name: Zoom Meeting SDK (Web)
  short_description: 'Zoom Meeting SDK for Web - Embed Zoom meeting capabilities into
    web applications. Two integration options: Client View (full-page, familiar Zoom
    UI) and Component View (embeddable, Promise-based API). Includes SharedArrayBuffer
    setup for HD video, gallery view, and virtual backgrounds.'
policy:
  allow_implicit_invocation: false
